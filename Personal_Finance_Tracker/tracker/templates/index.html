{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Finance Dashboard</title>
    <script src="{% static 'js/chart.min.js' %}"></script>
    <script src="{% static 'js/finance_chart.js' %}"></script>
    <style>
        .chart-container {
            width: 450px;
            height: 450px;
            margin: 50px auto;
        }
    </style>
</head>
<body>
    <h1 style="text-align: center;">My Finance Tracker</h1>
     <nav>
        <ul>
            <li class="nav-item"><a class="nav-link" href="{% url 'index' %}">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="{% url 'transaction' %}">Transaction</a></li>
            <li class="nav-item"><a class="nav-link" href="{% url 'add_transaction' %}">Add New</a></li>
        </ul>
    </nav>
    
    <div style="text-align: center; margin-bottom: 20px;">
        <form method="GET" action="{% url 'index' %}">
            <label for="month">Filter Month:</label>
            <!-- Fixed value binding to use context variable -->
            <input type="month" id="month" name="month_filter" value="{{ selected_month }}">
            <button type="submit">Filter</button>
            <a href="{% url 'index' %}">Clear</a>
        </form>
    </div>

    <div class="chart-container">
        <canvas id="financeChart"></canvas>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            renderFinanceChart({{ income }}, {{ expense }}, {{ balance }});
        });
    </script>
</body>
</html>
